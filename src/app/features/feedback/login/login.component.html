<div class="feedback-container">
  <mat-card class="feedback-card">
    <mat-card-header>
      <mat-card-title>Send Feedback</mat-card-title>
      <mat-card-subtitle>We'd love to hear your thoughts on the app!</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form #feedbackForm="ngForm" (ngSubmit)="onSubmit(feedbackForm)" class="feedback-form">
        
        <mat-form-field appearance="outline">
          <mat-label>Your Name</mat-label>
          <input matInput type="text" name="name" [(ngModel)]="feedbackData.name" required minlength="2" #name="ngModel">
          <mat-error *ngIf="name.invalid && (name.dirty || name.touched)">
            <span *ngIf="name.errors?.['required']">Name is required.</span>
            <span *ngIf="name.errors?.['minlength']">Name must be at least 2 characters.</span>
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email Address</mat-label>
          <input matInput type="email" name="email" [(ngModel)]="feedbackData.email" required email #email="ngModel">
          <mat-error *ngIf="email.invalid && (email.dirty || email.touched)">
            <span *ngIf="email.errors?.['required']">Email is required.</span>
            <span *ngIf="email.errors?.['email']">Please enter a valid email.</span>
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Message</mat-label>
          <textarea matInput name="message" [(ngModel)]="feedbackData.message" required minlength="10" rows="5" #message="ngModel"></textarea>
          <mat-error *ngIf="message.invalid && (message.dirty || message.touched)">
            <span *ngIf="message.errors?.['required']">Message is required.</span>
            <span *ngIf="message.errors?.['minlength']">Message must be at least 10 characters.</span>
          </mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="feedbackForm.invalid" class="submit-btn" aria-label="Submit Feedback">
          Submit Feedback
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
